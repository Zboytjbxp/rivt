name: Gate A Safety

on:
  pull_request:
  push:
    branches:
      - master
      - "codex/**"

permissions:
  contents: read

concurrency:
  group: gate-a-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rivt_test
          POSTGRES_PASSWORD: rivt_test
          POSTGRES_DB: rivt_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rivt_test -d rivt_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql://rivt_test:rivt_test@127.0.0.1:5432/rivt_test
      PGSSL: disable

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Install browser
        run: npx playwright install --with-deps chromium

      - name: Build production bundle
        run: npm run build

      - name: Lint repository
        run: npm run lint

      - name: Run unit and integration tests
        run: npm run test

      - name: Require current launch-readiness evidence
        run: npm run launch:readiness -- --require-ready

      - name: Run fail-closed browser test
        run: npm run test:e2e

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
