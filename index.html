    <style>
      #rivt-boot-fallback {
        box-sizing: border-box;
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #ff4b00;
        color: #0b0b0b;
        font-family: Arial, sans-serif;
      }
      #rivt-boot-fallback[hidden],
      html.rivt-app-ready #rivt-boot-fallback { display: none; }
      #rivt-boot-fallback > div { width: min(100%, 380px); }
      #rivt-boot-fallback strong { display: block; font-size: 16px; letter-spacing: .12em; text-transform: uppercase; }
      #rivt-boot-fallback h1 { margin: 12px 0 10px; font-size: 34px; line-height: 1; }
      #rivt-boot-fallback p { margin: 0; font-size: 16px; line-height: 1.45; }
      #rivt-boot-fallback button { display: none; width: 100%; min-height: 50px; margin-top: 20px; border: 0; border-radius: 10px; background: #0b0b0b; color: #fff; font: 700 16px Arial, sans-serif; }
      #rivt-boot-fallback.is-recovery button { display: block; }
      #rivt-update-notice { position: fixed; right: 16px; bottom: 16px; z-index: 2147483646; display: none; width: min(380px, calc(100vw - 32px)); align-items: center; justify-content: space-between; gap: 14px; box-sizing: border-box; padding: 14px 16px; border: 1px solid rgba(255,255,255,.16); border-radius: 12px; background: #0b0b0b; color: #fff; font: 600 14px/1.3 Arial, sans-serif; box-shadow: 0 18px 50px rgba(0,0,0,.3); }
      #rivt-update-notice.is-visible { display: flex; }
      #rivt-update-notice button { min-height: 40px; flex: 0 0 auto; border: 0; border-radius: 8px; padding: 0 14px; background: #ff4b00; color: #fff; font: 700 14px Arial, sans-serif; }
    </style>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "RIVT",
        "url": "https://rivt.pro/",
        "logo": "https://rivt.pro/rivt-app-icon-512.png",
        "description": "RIVT is the professional network for skilled trades."
      }
    </script>
  </head>
  <body>
    <div id="rivt-boot-fallback" role="status" aria-live="polite">
      <div>
        <strong>RIVT</strong>
        <h1>Opening RIVT</h1>
        <p id="rivt-boot-copy">Loading your workspace.</p>
        <button id="rivt-boot-refresh" type="button">Refresh RIVT</button>
      </div>
    </div>
    <div id="root"></div>
    <div id="rivt-update-notice" role="status" aria-live="polite">
      <span>New RIVT version available.</span>
      <button id="rivt-update-refresh" type="button">Refresh</button>
    </div>
    <script>
      (function () {
        var fallback = document.getElementById('rivt-boot-fallback');
        var copy = document.getElementById('rivt-boot-copy');
        var refresh = document.getElementById('rivt-boot-refresh');
        var ready = function () { return document.documentElement.classList.contains('rivt-app-ready'); };
        var showRecovery = function () {
          if (!fallback || ready()) return;
          fallback.classList.add('is-recovery');
          fallback.setAttribute('role', 'alert');
          if (copy) copy.textContent = 'This phone may be holding an older RIVT update. Refresh to load the latest version.';
        };
        var refreshShell = async function () {
          try {
            if ('serviceWorker' in navigator) {
              var registrations = await navigator.serviceWorker.getRegistrations();
              await Promise.all(registrations.map(function (registration) { return registration.unregister(); }));
            }
            if ('caches' in window) {
              var keys = await caches.keys();
              await Promise.all(keys.map(function (key) { return caches.delete(key); }));
            }
          } finally {
            window.location.replace('/');
          }
        };
        if (refresh) refresh.addEventListener('click', refreshShell);
        window.addEventListener('error', showRecovery);
        window.addEventListener('unhandledrejection', showRecovery);
        window.setTimeout(showRecovery, 12000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          var hadController = Boolean(navigator.serviceWorker.controller);
          var appModule = document.querySelector('script[type="module"][src]');
          var buildId = appModule ? new URL(appModule.src, window.location.href).pathname : 'development';
          var updateNotice = document.getElementById('rivt-update-notice');
          var updateRefresh = document.getElementById('rivt-update-refresh');
          if (updateRefresh) updateRefresh.addEventListener('click', function () { window.location.reload(); });
          navigator.serviceWorker.register('/sw.js?build=' + encodeURIComponent(buildId), { updateViaCache: 'none' }).then(function (registration) {
            registration.update().catch(function () {});
            navigator.serviceWorker.addEventListener('controllerchange', function () {
              if (!hadController) return;
              if (document.visibilityState === 'hidden') {
                window.location.reload();
                return;
              }
              if (updateNotice) updateNotice.classList.add('is-visible');
            }, { once: true });
          }).catch(function () {});
        });
      }
    </script>
  </body>
